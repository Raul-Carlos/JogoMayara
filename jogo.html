<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo by Mittraul</title>
    <link href="style.css" rel="stylesheet">
</head>
<body>
    <div class="game">
        <div class="start-screen">
            <img src="./assets/logo.png" class="logo">
            <img src="./assets/playbtn.png" class="btn-play">
            <footer>
                <p style="color:whitesmoke">Made by: Samuel Mitt & Raul Alves</p>
            </footer>

        </div>
        <div class="score-container">Pulos: <span id="jump-counter">0</span></div>
        <img src="./assets/tucano.gif" class="tucano-sky tucano-sky-1">
        <img src="./assets/tucano.gif" class="tucano-sky tucano-sky-2">
        <img src="./assets/tucano.gif" class="obstaculo">
        <img src="./assets/hog.png" class="hog">
        <div class="kong-container">
            <img src="./assets/kong.gif" class="kong">
        </div>
    </div>
    
    <div class="game-over">
        <div class="game-over-buttons">
            <img src="./assets/replaybtn.png" class="btn-replay" id="btn-replay">
            <img src="./assets/homebtn.png" class="btn-home" id="btn-home">
        </div>
    </div>


<script src="script.js"></script>    
</body>
</html>
